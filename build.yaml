---
include:
  - board: nice_nano_v2
    # 左手側：キーボード本体の定義だけで動くため、後ろのシールド指定は一切不要です
    shield: eyelash_sofle_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n
  - board: nice_nano_v2
    # 右手側：マニュアルにある「adapter」等は書かず、アニメーションシールドだけを重ねます
    shield: eyelash_sofle_right nice_view_custom
  - board: nice_nano_v2
    board: nice_nano_v2
    shield: settings_reset
