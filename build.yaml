---
include:
  - board: nice_nano_v2
    # 左手側：本体定義だけで完結するため通常画面としてそのまま通ります
    shield: eyelash_sofle_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n
  - board: nice_nano_v2
    # 右手側：nice_view_custom の横に「nice_view_peripheral」を必ず書き足します
    shield: eyelash_sofle_right nice_view_custom nice_view_peripheral
  - board: nice_nano_v2
    board: nice_nano_v2
    shield: settings_reset
