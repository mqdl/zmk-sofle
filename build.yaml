---
include:
  - board: nice_nano_v2
    # 左手側：nice_viewシールドを外します（基板定義側が自動で画面を出すため）
    shield: eyelash_sofle_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n
  - board: nice_nano_v2
    # 右手側：ここが決定的な違いです。「eyelash_sofle_right」の【前】にカスタムシールドを置きます
    shield: nice_view_custom eyelash_sofle_right
  - board: nice_nano_v2
    shield: settings_reset
